[theme]
name = "gruvbox-dark"
[theme.overrides]
separator = "|"
separator_fg="#ffffff"


[icons]
name = "awesome"

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0

[[block]]
block = "disk_space"
path = "/media/nikolas/Data"
alias = "Data"
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0


[[block]]
block = "memory"
display_type = "memory"
format_mem = "RAM: Free {MAg}GB ({MAp}%)"
format_swap = "SWAP: Free {SFg}GB ({SFp}%)"
warning_mem = 20
warning_swap = 80
critical_mem = 95
critical_swap = 95
clickable = true
icons = false

[[block]]
block = "music"
player = "spotify"
buttons = ["prev", "play", "next"]
max_width=25
marquee=false

[[block]]
block = "sound"
step_width= 5

[[block]]
block = "load"
interval = 1
format = "{1m} {5m}"

[[block]]
block = "uptime"






[[block]]
block = "temperature"
collapsed = false
interval = 10

[[block]]
block = "time"
interval = 60
format = "%a %d/%m %R"

